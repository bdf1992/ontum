# Serve Causality's experience layer (done-line: serve-causality-surface).
#
# The hard rule "no network at runtime" governs the LOOP — its metabolism stays
# local-first: no broker, no daemon, no socket while it folds. This workflow is
# the EXPERIENCE LAYER, not the loop: a build-time step that publishes the canvas
# and the welcome mat as static artifacts to GitHub Pages, so the owner can open
# the surface from his phone. The loop never reaches the network; the published
# page is a deterministic render of committed bytes (the canvas) and a fold over
# the committed log (the welcome mat) — cache, never truth (§14.1).
#
# The welcome mat is the landing page (the owner's sequence: welcome -> canvas);
# the canvas is one tap in.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one live deploy at a time; a newer push supersedes an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"  # pure stdlib; nothing to install

      - name: Assemble the static experience layer
        run: |
          mkdir -p _site
          # the Story demo IS the landing (iterations 0003-0006): a phrase rendered
          # the full membrane/composition way, reading the design-system tokens +
          # the phrase portfolio
          cp causality/story.html       _site/index.html
          cp causality/canvas-system.js _site/canvas-system.js
          cp causality/phrases.json     _site/phrases.json
          # the simulation editor canvas, secondary (one surface, two modes)
          cp causality/canvas.html  _site/canvas.html
          cp causality/canvas.js    _site/canvas.js
          cp causality/inspector.js _site/inspector.js
          cp causality/authoring.js _site/authoring.js
          cp causality/demos.html   _site/demos.html
          cp causality/mock-recursion.html _site/mock-recursion.html
          # the felt-field mat, kept as a secondary page
          python -m causality.welcome render --out _site/welcome.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true  # first run turns Pages on; no owner toggle needed

      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
