# Serve Causality's experience layer (done-line: serve-causality-surface).
#
# The hard rule "no network at runtime" governs the LOOP — its metabolism stays
# local-first: no broker, no daemon, no socket while it folds. This workflow is
# the EXPERIENCE LAYER, not the loop: a build-time step that publishes the canvas
# and the welcome mat as static artifacts to GitHub Pages, so the owner can open
# the surface from his phone. The loop never reaches the network; the published
# page is a deterministic render of committed bytes (the canvas) and a fold over
# the committed log (the welcome mat) — cache, never truth (§14.1).
#
# The welcome mat is the landing page (the owner's sequence: welcome -> canvas);
# the canvas is one tap in.
#
# The production gate (done-line 0137, epic.environments wave 1): this workflow
# no longer serves HEAD unconditionally. It asks `loop.deploy` which snapshot is
# authorized for the live surface and serves THAT — the latest commit bdo stamped
# (`production_promotion`). A push that bdo has not stamped does not move the live
# URL; it stays on the stamped snapshot. The gate executes bdo's stamp, it never
# invents a verdict (the .github/ law). Before bdo's first stamp the gate is in
# loud unstamped passthrough (serves HEAD), so turning this on never dark-takes
# the live site — the teeth engage on his first promotion gesture.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one live deploy at a time; a newer push supersedes an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # the gate may serve a stamped snapshot older than HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"  # pure stdlib; nothing to install

      - name: Ask the production gate which snapshot is authorized
        id: gate
        run: |
          # Run the gate from HEAD's code (latest policy); it reads the log and
          # names the deploy target — the stamped snapshot, or HEAD in unstamped
          # passthrough. Never blocks the run: held content is simply not served;
          # the stamped snapshot is served instead (the teeth).
          python -m loop.deploy gate --candidate "$GITHUB_SHA" --json | tee /tmp/gate.json
          target=$(python -c "import json;print(json.load(open('/tmp/gate.json'))['deploy'] or '')")
          verdict=$(python -c "import json;print(json.load(open('/tmp/gate.json'))['verdict'])")
          echo "target=$target"   >> "$GITHUB_OUTPUT"
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          echo "::notice title=production gate::serving $verdict snapshot ${target:0:12}"

      - name: Check out the stamped snapshot
        if: steps.gate.outputs.target != '' && steps.gate.outputs.target != github.sha
        run: |
          # Serve the snapshot bdo stamped, not HEAD. The gate logic above already
          # ran from HEAD; the SITE CONTENT comes from the authorized snapshot.
          git checkout --force "${{ steps.gate.outputs.target }}"

      - name: Assemble the static experience layer
        run: |
          mkdir -p _site
          # the Story demo IS the landing (iterations 0003-0006): a phrase rendered
          # the full membrane/composition way, reading the design-system tokens +
          # the phrase portfolio
          cp causality/story.html       _site/index.html
          cp causality/canvas-system.js _site/canvas-system.js
          cp causality/space.js         _site/space.js
          cp causality/phrases.json     _site/phrases.json
          # the simulation editor canvas, secondary (one surface, two modes)
          cp causality/canvas.html  _site/canvas.html
          cp causality/canvas.js    _site/canvas.js
          cp causality/inspector.js _site/inspector.js
          cp causality/authoring.js _site/authoring.js
          cp causality/demos.html   _site/demos.html
          cp causality/mock-recursion.html _site/mock-recursion.html
          # the felt-field mat, kept as a secondary page
          python -m causality.welcome render --out _site/welcome.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true  # first run turns Pages on; no owner toggle needed

      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
