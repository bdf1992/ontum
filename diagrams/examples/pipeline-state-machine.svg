<line x1="450.0" y1="195.0" x2="500.0" y2="195.0" stroke="#5C5C60" stroke-width="1" marker-end="url(#arrow)"/>
<text x="475.0" y="184.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="14" fill="#8C8C8F">pass</text>
<line x1="680.0" y1="195.0" x2="730.0" y2="195.0" stroke="#5C5C60" stroke-width="1" marker-end="url(#arrow)"/>
