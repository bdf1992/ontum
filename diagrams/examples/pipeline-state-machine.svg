<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
<rect width="1200" height="360" fill="#0B0B0C"/>
<defs>
  <pattern id="halftone" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
    <rect width="5" height="5" fill="#0F1011"/>
    <circle cx="1" cy="1" r="0.6" fill="#1F2123"/>
  </pattern>
  <filter id="glow-cool" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#5EB7A1" flood-opacity="0.6"/>
  </filter>
  <filter id="glow-warm" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#C97A55" flood-opacity="0.6"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#5C5C60"/>
  </marker>
</defs>
<text x="32" y="38" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="18" font-weight="600" fill="#E6E6E6">Ontum pipeline · the state machine an atom moves through</text>
<polygon points="130.0,160 220,195.0 130.0,230 40,195.0" fill="url(#halftone)" stroke="#C97A55" stroke-width="1.5" filter="url(#glow-warm)"/>
