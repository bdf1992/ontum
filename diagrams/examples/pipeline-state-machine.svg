<polygon points="749.6,160 890.4,160 910,195.0 890.4,230 749.6,230 730,195.0" fill="url(#halftone)" stroke="#5EB7A1" stroke-width="1.5" filter="url(#glow-cool)"/>
<text x="820.0" y="195.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="820.0" dy="-0.00em">handoff</tspan></text>
<rect x="960" y="160" width="180" height="70" rx="35.0" ry="35.0" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="1050.0" y="195.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="1050.0" dy="-0.00em">confirm</tspan></text>
