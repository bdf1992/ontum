<text x="32" y="447" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="12" fill="#8C8C8F">Clockwise metabolism: energy feeds the systems-matter substrate; the system operates and observes; coherence reads the friction (measured against the fixed pole) and</text>
<text x="32" y="462" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="12" fill="#8C8C8F">surfaces to the field; the owner elevates it back (dashed return). Coherence scores an act PREDICTIVE vs TRIVIAL; an act names its consequence-receipt or HALTs.</text>
