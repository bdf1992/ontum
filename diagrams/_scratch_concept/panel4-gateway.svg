<text x="32" y="672" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="12" fill="#8C8C8F">Gateway stack — a fidelity draft of bdo&#x27;s model, for his correction. A request&#x27;s journey runs top to bottom: authN, policy, authZ, into the physical-enforcement band</text>
<text x="32" y="687" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="12" fill="#8C8C8F">(gate, threshold, guard, fence — co-present perimeter mechanisms, threaded right-to-left), then attribution, pen, patrol, ledger, heal. Warm marks the three A&#x27;s</text>
<text x="32" y="702" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="12" fill="#8C8C8F">running across the stack — authenticated (authN), authorized (authZ), attributed (attribution); cool is the enforcement layer.</text>
