<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
<rect width="1400" height="560" fill="#0B0B0C"/>
<defs>
  <pattern id="halftone" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
    <rect width="5" height="5" fill="#0F1011"/>
    <circle cx="1" cy="1" r="0.6" fill="#1F2123"/>
  </pattern>
  <filter id="glow-cool" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#5EB7A1" flood-opacity="0.6"/>
  </filter>
  <filter id="glow-warm" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#C97A55" flood-opacity="0.6"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#5C5C60"/>
  </marker>
</defs>
<text x="32" y="38" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="18" font-weight="600" fill="#E6E6E6">Ontum gateway stack · a projection from truth</text>
<rect x="40" y="70" width="1280" height="200" rx="6" ry="6" fill="url(#halftone)" stroke="none"/>
<rect x="40" y="310" width="1280" height="200" rx="6" ry="6" fill="url(#halftone)" stroke="none"/>
<rect x="60" y="110" width="220" height="140" rx="4" ry="4" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="170.0" y="180.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="170.0" dy="-2.50em">authentication</tspan><tspan x="170.0" dy="1.25em">the trust ladder:</tspan><tspan x="170.0" dy="1.25em">rungs are bdo&#x27;s to</tspan><tspan x="170.0" dy="1.25em">grant, denied until</tspan><tspan x="170.0" dy="1.25em">admitted</tspan></text>
<rect x="310" y="110" width="220" height="140" rx="4" ry="4" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="420.0" y="180.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="420.0" dy="-2.50em">fence</tspan><tspan x="420.0" dy="1.25em">the registry carries</tspan><tspan x="420.0" dy="1.25em">forbidden-decision</tspan><tspan x="420.0" dy="1.25em">rules (e.g. raw git</tspan><tspan x="420.0" dy="1.25em">push)</tspan></text>
<rect x="1060" y="110" width="220" height="140" rx="4" ry="4" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="1170.0" y="180.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="1170.0" dy="-2.50em">gate</tspan><tspan x="1170.0" dy="1.25em">observe.gate() is the</tspan><tspan x="1170.0" dy="1.25em">consequence-gate: an</tspan><tspan x="1170.0" dy="1.25em">under-declared act</tspan><tspan x="1170.0" dy="1.25em">HALTS</tspan></text>
<rect x="810" y="110" width="220" height="140" rx="4" ry="4" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="920.0" y="180.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="920.0" dy="-2.50em">guard</tspan><tspan x="920.0" dy="1.25em">the command guard</tspan><tspan x="920.0" dy="1.25em">compiles its</tspan><tspan x="920.0" dy="1.25em">deny-rules from the</tspan><tspan x="920.0" dy="1.25em">fence registry</tspan></text>
<rect x="810" y="350" width="220" height="140" rx="4" ry="4" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="920.0" y="420.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="920.0" dy="-2.50em">heal</tspan><tspan x="920.0" dy="1.25em">the healing fold</tspan><tspan x="920.0" dy="1.25em">detects a stale-park</tspan><tspan x="920.0" dy="1.25em">bite and proposes the</tspan><tspan x="920.0" dy="1.25em">heal</tspan></text>
<rect x="560" y="350" width="220" height="140" rx="4" ry="4" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="670.0" y="420.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="670.0" dy="-2.50em">ledger</tspan><tspan x="670.0" dy="1.25em">the Fold computes</tspan><tspan x="670.0" dy="1.25em">every atom&#x27;s state</tspan><tspan x="670.0" dy="1.25em">from the append-only</tspan><tspan x="670.0" dy="1.25em">log</tspan></text>
<rect x="310" y="350" width="220" height="140" rx="4" ry="4" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="420.0" y="420.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="420.0" dy="-2.50em">patrol</tspan><tspan x="420.0" dy="1.25em">the patrol arms an</tspan><tspan x="420.0" dy="1.25em">escalate marker for</tspan><tspan x="420.0" dy="1.25em">what genuinely needs</tspan><tspan x="420.0" dy="1.25em">bdo</tspan></text>
<rect x="60" y="350" width="220" height="140" rx="4" ry="4" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="170.0" y="420.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="170.0" dy="-2.50em">pen</tspan><tspan x="170.0" dy="1.25em">judge() is the one</tspan><tspan x="170.0" dy="1.25em">pen by which a</tspan><tspan x="170.0" dy="1.25em">summoned node writes</tspan><tspan x="170.0" dy="1.25em">its verdict</tspan></text>
<rect x="560" y="110" width="220" height="140" rx="4" ry="4" fill="url(#halftone)" stroke="#3A3A3D" stroke-width="1"/>
<text x="670.0" y="180.0" text-anchor="middle" dominant-baseline="central" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="16" fill="#E6E6E6"><tspan x="670.0" dy="-2.50em">policy</tspan><tspan x="670.0" dy="1.25em">authorize() is the</tspan><tspan x="670.0" dy="1.25em">PEP — default-deny</tspan><tspan x="670.0" dy="1.25em">over the admitted</tspan><tspan x="670.0" dy="1.25em">policy set</tspan></text>
<line x1="280.0" y1="180.0" x2="310.0" y2="180.0" stroke="#5C5C60" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="530.0" y1="180.0" x2="560.0" y2="180.0" stroke="#5C5C60" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="780.0" y1="180.0" x2="810.0" y2="180.0" stroke="#5C5C60" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="1030.0" y1="180.0" x2="1060.0" y2="180.0" stroke="#5C5C60" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="280.0" y1="420.0" x2="310.0" y2="420.0" stroke="#5C5C60" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="530.0" y1="420.0" x2="560.0" y2="420.0" stroke="#5C5C60" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="780.0" y1="420.0" x2="810.0" y2="420.0" stroke="#5C5C60" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="70" width="1280" height="200" rx="6" ry="6" fill="none" stroke="#3A3A3D" stroke-width="1"/>
<text x="54" y="92" text-anchor="start" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="12" fill="#8C8C8F" letter-spacing="1.2">GATEKEEPING</text>
<rect x="40" y="310" width="1280" height="200" rx="6" ry="6" fill="none" stroke="#3A3A3D" stroke-width="1"/>
<text x="54" y="332" text-anchor="start" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="12" fill="#8C8C8F" letter-spacing="1.2">ACTING</text>
<text x="32" y="542" font-family='"JetBrains Mono", "IBM Plex Mono", "Berkeley Mono", ui-monospace, "Cascadia Code", "Fira Code", monospace' font-size="12" fill="#8C8C8F">Realness AND meaning are derived, not asserted: each drawn layer resolves to minted-runtime code (so each is a rect), and the line under each name is the claim of that term&#x27;s first resolving citation — read from records, so fence/heal/pen read truthfully instead of as a generic gateway. The named-only `threshold` layer cites a backing that resolves nowhere — refused as a gap, dropped not drawn — so the stack flow breaks where it would sit. A fold over committed bytes (term_economy.py), never a second source of truth.</text>
</svg>