<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bicone tolerance control — field · set boundary · recent bound · point</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #fff;
      --ink: #101827;
      --muted: #667085;
      --line: #cbd5e1;
      --blue: #2563eb;
      --cyan: #0ea5e9;
      --amber: #f59e0b;
      --shadow: 0 16px 50px rgba(15, 23, 42, .10);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      padding: 32px;
    }

    .wrap {
      width: min(880px, 100%);
      background: var(--card);
      border: 1px solid #d9e1ec;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .top { display: flex; align-items: center; gap: 18px; margin-bottom: 22px; }

    .knob {
      width: 104px; height: 104px; cursor: grab;
      user-select: none; touch-action: none;
      filter: drop-shadow(0 8px 12px rgba(15,23,42,.14));
    }
    .knob:active { cursor: grabbing; }

    .readout h1 { font-size: 18px; margin: 0 0 6px; letter-spacing: -.02em; }
    .readout p { margin: 0; color: var(--muted); font-size: 14px; }

    .value {
      display: inline-flex; min-width: 92px; height: 38px;
      align-items: center; justify-content: center;
      border: 1px solid var(--line); border-radius: 12px;
      font-weight: 750; margin-top: 10px; background: #fbfdff;
    }

    .winCtl { margin-left: auto; display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; }
    .winCtl input { width: 130px; }

    .sliderCard {
      border: 1px solid #d9e1ec; border-radius: 18px;
      padding: 18px 18px 14px;
      background: linear-gradient(180deg, #fff, #fbfcff);
    }

    .bar { width: 100%; height: 210px; display: block; user-select: none; touch-action: none; }

    .legend {
      display: flex; flex-wrap: wrap; gap: 14px;
      color: var(--muted); font-size: 13px; padding: 0 8px; margin-top: 4px;
    }
    .legend span { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
    .sw { width: 14px; height: 10px; border-radius: 3px; display: inline-block; }

    .micro { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 10px; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid #d9e1ec; background: white; border-radius: 999px;
      padding: 8px 12px; color: #344054; font-size: 13px;
    }
    .dotp { width: 8px; height: 8px; border-radius: 999px; background: var(--blue); }

    .handle { cursor: ew-resize; }
    .clipperX { cursor: ew-resize; }
    .clipperY { cursor: ns-resize; }
    .region { cursor: grab; }
    .region:active { cursor: grabbing; }
    .dotHandle { cursor: move; }
    .dotHandle:active { cursor: grabbing; }
    .svg-ui-label { pointer-events: none; user-select: none; }

    /* Each boundary gripper is its own element, revealed independently on ITS OWN hover. */
    .clipperX .vis, .clipperY .vis { opacity: 0; transition: opacity .2s ease; }
    .clipperX:hover .vis, .clipperY:hover .vis { opacity: 1; }
    .clipperX .vis *, .clipperY .vis * { pointer-events: none; }
    .gripHit { fill: transparent; pointer-events: all; }
    /* Central section affordances reveal on hover of the bar, independent of the boundary. */
    .region .handle { opacity: 0; pointer-events: none; transition: opacity .22s ease; }
    .bar:hover .region .handle { opacity: 1; pointer-events: auto; }
    #leftBound, #rightBound { stroke-opacity: .22; transition: stroke-opacity .22s ease; }
    .bar:hover #leftBound, .bar:hover #rightBound { stroke-opacity: .5; }

    text { font-family: inherit; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <svg id="knob" class="knob" viewBox="0 0 120 120" role="slider" tabindex="0" aria-label="Angle knob: projection direction">
        <defs>
          <radialGradient id="face" cx="48%" cy="38%" r="74%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="78%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#e5e7eb"/>
          </radialGradient>
        </defs>
        <circle cx="60" cy="60" r="52" fill="url(#face)" stroke="#cbd5e1" stroke-width="1.5"/>
        <g id="ticks"></g>
        <text x="60" y="22" text-anchor="middle" font-size="13" fill="#64748b">12</text>
        <text x="98" y="64" text-anchor="middle" font-size="13" fill="#64748b">3</text>
        <text x="60" y="104" text-anchor="middle" font-size="13" fill="#64748b">6</text>
        <text x="22" y="64" text-anchor="middle" font-size="13" fill="#64748b">9</text>
        <line id="hand" x1="60" y1="60" x2="86" y2="34" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
        <circle cx="60" cy="60" r="9" fill="#2563eb"/>
        <circle id="tip" cx="86" cy="34" r="9" fill="#2563eb"/>
      </svg>

      <div class="readout">
        <h1>Angle knob</h1>
        <p>Sets the projection direction.</p>
        <div class="value" id="clockValue">2 o'clock</div>
      </div>

      <label class="winCtl">
        recency window
        <input id="windowSlider" type="range" min="1" max="12" step="0.5" value="4" />
        <span id="windowValue">4.0 s</span>
      </label>
    </div>

    <section class="sliderCard">
      <svg id="bar" class="bar" viewBox="0 0 820 210" aria-label="Bicone tolerance field">
        <defs>
          <linearGradient id="coneL" x1="0" x2="1">
            <stop offset="0%" stop-color="#94a3b8" stop-opacity=".40"/>
            <stop offset="100%" stop-color="#fff" stop-opacity=".05"/>
          </linearGradient>
          <linearGradient id="coneR" x1="1" x2="0">
            <stop offset="0%" stop-color="#94a3b8" stop-opacity=".40"/>
            <stop offset="100%" stop-color="#fff" stop-opacity=".05"/>
          </linearGradient>
          <clipPath id="setBoundClip"><rect id="setBoundRect" x="20" y="48" width="780" height="112"/></clipPath>
          <clipPath id="windowClip"><rect id="windowRect" x="260" y="48" width="300" height="112"/></clipPath>
          <clipPath id="frameClip"><rect x="20" y="48" width="780" height="112" rx="20"/></clipPath>
        </defs>

        <rect x="20" y="48" width="780" height="112" rx="20" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>

        <g clip-path="url(#frameClip)">
          <!-- The field: two cones meeting tip-to-tip at the neck (0). -->
          <polygon points="20,52 410,104 20,156" fill="url(#coneL)" stroke="#cbd5e1" stroke-width="1"/>
          <polygon points="800,52 410,104 800,156" fill="url(#coneR)" stroke="#cbd5e1" stroke-width="1"/>

          <!-- Set boundary: the field that survives the hard outer limits is the live set. -->
          <g clip-path="url(#setBoundClip)">
            <polygon points="20,52 410,104 20,156" fill="#0ea5e9" fill-opacity=".07"/>
            <polygon points="800,52 410,104 800,156" fill="#0ea5e9" fill-opacity=".07"/>
          </g>

          <!-- Tolerance: the field through the range window. -->
          <g clip-path="url(#windowClip)">
            <polygon points="20,52 410,104 20,156" fill="#2563eb" fill-opacity=".10" stroke="#2563eb" stroke-opacity=".30" stroke-width="1"/>
            <polygon points="800,52 410,104 800,156" fill="#2563eb" fill-opacity=".10" stroke="#2563eb" stroke-opacity=".30" stroke-width="1"/>
          </g>

          <!-- Recent bound: where the point has been over the last X time. -->
          <rect id="recentBand" x="380" y="48" width="60" height="112" fill="#f59e0b" fill-opacity=".10" stroke="#f59e0b" stroke-opacity=".42" stroke-width="1" stroke-dasharray="5 4"/>

          <line x1="20" y1="104" x2="800" y2="104" stroke="#64748b" stroke-dasharray="7 8" stroke-opacity=".55"/>
          <line id="angleLine" x1="260" y1="104" x2="560" y2="104" stroke="#2563eb" stroke-width="2" stroke-opacity=".30"/>
        </g>

        <!-- The neck: where polarity inverts, setpoint 0. -->
        <line x1="410" y1="50" x2="410" y2="158" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 4" opacity=".7"/>
        <circle cx="410" cy="104" r="4.5" fill="#fff" stroke="#94a3b8" stroke-width="1.6"/>
        <text class="svg-ui-label" x="410" y="194" text-anchor="middle" font-size="10" fill="#475569" font-weight="750">neck · 0</text>

        <text x="120" y="186" text-anchor="middle" font-size="13" fill="#475569">&#8722; cone-field</text>
        <text x="700" y="186" text-anchor="middle" font-size="13" fill="#475569">+ cone-field</text>

        <!-- Set boundary (cyan): each gripper is its own element, hover-revealed independently. -->
        <g id="setBoundLayer">
          <g id="leftClipper" class="clipperX">
            <rect id="leftHit" class="gripHit" x="0" y="48" width="44" height="112"/>
            <g class="vis">
              <line id="leftClipLine" x1="20" x2="20" y1="48" y2="160" stroke="#0ea5e9" stroke-width="3"/>
              <rect id="leftClipHandle" x="10" y="92" width="20" height="40" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
              <text id="leftClipLabel" class="svg-ui-label" x="20" y="40" text-anchor="middle" font-size="10" fill="#0369a1" font-weight="750">MIN</text>
            </g>
          </g>
          <g id="rightClipper" class="clipperX">
            <rect id="rightHit" class="gripHit" x="776" y="48" width="44" height="112"/>
            <g class="vis">
              <line id="rightClipLine" x1="800" x2="800" y1="48" y2="160" stroke="#0ea5e9" stroke-width="3"/>
              <rect id="rightClipHandle" x="790" y="92" width="20" height="40" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
              <text id="rightClipLabel" class="svg-ui-label" x="800" y="40" text-anchor="middle" font-size="10" fill="#0369a1" font-weight="750">MAX</text>
            </g>
          </g>
          <g id="topClipper" class="clipperY">
            <rect id="topHit" class="gripHit" x="20" y="40" width="780" height="22"/>
            <g class="vis">
              <line id="topClipLine" x1="20" x2="800" y1="48" y2="48" stroke="#0ea5e9" stroke-width="1.8" stroke-dasharray="5 5" opacity=".8"/>
              <rect id="topClipHandle" x="394" y="40" width="32" height="14" rx="7" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
            </g>
          </g>
          <g id="bottomClipper" class="clipperY">
            <rect id="bottomHit" class="gripHit" x="20" y="146" width="780" height="22"/>
            <g class="vis">
              <line id="bottomClipLine" x1="20" x2="800" y1="160" y2="160" stroke="#0ea5e9" stroke-width="1.8" stroke-dasharray="5 5" opacity=".8"/>
              <rect id="bottomClipHandle" x="394" y="154" width="32" height="14" rx="7" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
            </g>
          </g>
        </g>

        <!-- Tolerance range handles. -->
        <g id="region" class="region">
          <line id="leftBound" x1="260" x2="260" y1="50" y2="158" stroke="#2563eb" stroke-width="1.6" stroke-opacity=".55"/>
          <line id="rightBound" x1="560" x2="560" y1="50" y2="158" stroke="#2563eb" stroke-width="1.6" stroke-opacity=".55"/>
          <rect id="leftHandle" class="handle" x="251" y="90" width="18" height="40" rx="9" fill="#e0efff" stroke="#2563eb" stroke-width="2"/>
          <rect id="rightHandle" class="handle" x="551" y="90" width="18" height="40" rx="9" fill="#e0efff" stroke="#2563eb" stroke-width="2"/>

          <!-- Current point: the live setpoint, bounded by the cone and the set boundary. -->
          <circle id="dot" class="dotHandle" cx="500" cy="90" r="8" fill="#2563eb" stroke="#fff" stroke-width="3"/>
          <text id="dotLabel" class="svg-ui-label" x="500" y="72" text-anchor="middle" font-size="10" fill="#0754d8" font-weight="750">point</text>
        </g>
      </svg>

      <div class="legend">
        <span><i class="sw" style="background:#0ea5e9"></i>set boundary (hard limits)</span>
        <span><i class="sw" style="background:#2563eb"></i>tolerance range</span>
        <span><i class="sw" style="background:#f59e0b"></i>recent bound (last X time)</span>
        <span><i class="sw" style="background:#1e3a8a;border-radius:999px;width:10px;height:10px"></i>current point</span>
      </div>
    </section>

    <div class="micro">
      <span class="pill" id="microSet">set boundary -1.00 to +1.00</span>
      <span class="pill" id="microRange">range -0.36 to +0.36</span>
      <span class="pill" id="microRecent">recent bound +0.10 to +0.40</span>
      <span class="pill"><span class="dotp"></span><span id="microDot">point +0.28</span></span>
    </div>
  </main>

  <script>
    const state = {
      clock: 2,
      // set boundary (hard outer limits)
      xMin: -1, xMax: 1, yTop: 1, yBottom: -1,
      // tolerance range
      xCenter: 0.0, width: 0.72,
      // current point
      dotX: 0.28, dotV: 0.62
    };

    let windowMs = 4000;
    let samples = [];        // {t, x} positions visited recently
    let lastClockMs = 0;     // monotonic-ish ms via performance.now via rAF timestamp

    const els = {
      knob: document.getElementById("knob"),
      ticks: document.getElementById("ticks"),
      hand: document.getElementById("hand"),
      tip: document.getElementById("tip"),
      clockValue: document.getElementById("clockValue"),
      bar: document.getElementById("bar"),
      angleLine: document.getElementById("angleLine"),
      setBoundRect: document.getElementById("setBoundRect"),
      windowRect: document.getElementById("windowRect"),
      recentBand: document.getElementById("recentBand"),
      leftClipper: document.getElementById("leftClipper"),
      rightClipper: document.getElementById("rightClipper"),
      topClipper: document.getElementById("topClipper"),
      bottomClipper: document.getElementById("bottomClipper"),
      leftHit: document.getElementById("leftHit"),
      rightHit: document.getElementById("rightHit"),
      topHit: document.getElementById("topHit"),
      bottomHit: document.getElementById("bottomHit"),
      leftClipLine: document.getElementById("leftClipLine"),
      rightClipLine: document.getElementById("rightClipLine"),
      leftClipHandle: document.getElementById("leftClipHandle"),
      rightClipHandle: document.getElementById("rightClipHandle"),
      leftClipLabel: document.getElementById("leftClipLabel"),
      rightClipLabel: document.getElementById("rightClipLabel"),
      topClipLine: document.getElementById("topClipLine"),
      bottomClipLine: document.getElementById("bottomClipLine"),
      topClipHandle: document.getElementById("topClipHandle"),
      bottomClipHandle: document.getElementById("bottomClipHandle"),
      region: document.getElementById("region"),
      leftBound: document.getElementById("leftBound"),
      rightBound: document.getElementById("rightBound"),
      leftHandle: document.getElementById("leftHandle"),
      rightHandle: document.getElementById("rightHandle"),
      dot: document.getElementById("dot"),
      dotLabel: document.getElementById("dotLabel"),
      windowSlider: document.getElementById("windowSlider"),
      windowValue: document.getElementById("windowValue"),
      microSet: document.getElementById("microSet"),
      microRange: document.getElementById("microRange"),
      microRecent: document.getElementById("microRecent"),
      microDot: document.getElementById("microDot")
    };

    // Field geometry. x in [-1,+1] across the frame; the neck (x=0) is the center.
    const frame = { x: 20, y: 48, w: 780, h: 112, cy: 104, neckX: 410 };
    const HH_MAX = 52;
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const fmt = n => (n >= 0 ? "+" : "") + n.toFixed(2);
    const xToPx = x => frame.x + ((x + 1) / 2) * frame.w;
    const pxToX = px => ((px - frame.x) / frame.w) * 2 - 1;
    const vToPx = v => frame.cy - v * HH_MAX;          // vertical field value (-1..1) -> px
    const pxToV = py => (frame.cy - py) / HH_MAX;
    const coneHalf = x => HH_MAX * Math.abs(x);

    function clientToSvg(svg, evt) {
      const pt = svg.createSVGPoint();
      pt.x = evt.clientX; pt.y = evt.clientY;
      return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function drawTicks() {
      for (let i = 0; i < 60; i++) {
        const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
        const big = i % 5 === 0;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", 60 + Math.cos(a) * (big ? 44 : 48));
        line.setAttribute("y1", 60 + Math.sin(a) * (big ? 44 : 48));
        line.setAttribute("x2", 60 + Math.cos(a) * 50);
        line.setAttribute("y2", 60 + Math.sin(a) * 50);
        line.setAttribute("stroke", big ? "#94a3b8" : "#cbd5e1");
        line.setAttribute("stroke-width", big ? "1.8" : "1");
        els.ticks.appendChild(line);
      }
    }

    const clockToDegrees = clock => clock * 30;
    function degreesToClock(deg) {
      const n = ((deg % 360) + 360) % 360;
      let clock = Math.round(n / 30);
      if (clock === 0) clock = 12;
      return clock;
    }

    function render() {
      // Set boundary clamps.
      state.xMin = clamp(state.xMin, -1, state.xMax - 0.12);
      state.xMax = clamp(state.xMax, state.xMin + 0.12, 1);
      state.yTop = clamp(state.yTop, state.yBottom + 0.12, 1);
      state.yBottom = clamp(state.yBottom, -1, state.yTop - 0.12);

      // Central section (tolerance range + point) is INDEPENDENT of the set
      // boundary — it spans the whole field, not the boundary's slice.
      state.width = clamp(state.width, 0.10, 2.0);
      state.xCenter = clamp(state.xCenter, -1 + state.width / 2, 1 - state.width / 2);

      const left = state.xCenter - state.width / 2;
      const right = state.xCenter + state.width / 2;
      state.dotX = clamp(state.dotX, left, right);
      state.dotV = clamp(state.dotV, -1, 1);

      // Knob.
      const deg = clockToDegrees(state.clock);
      const knobA = deg * Math.PI / 180 - Math.PI / 2;
      els.hand.setAttribute("x2", 60 + Math.cos(knobA) * 34);
      els.hand.setAttribute("y2", 60 + Math.sin(knobA) * 34);
      els.tip.setAttribute("cx", 60 + Math.cos(knobA) * 34);
      els.tip.setAttribute("cy", 60 + Math.sin(knobA) * 34);
      els.clockValue.textContent = `${state.clock} o'clock`;
      const lineA = (deg - 90) * Math.PI / 180;
      els.angleLine.setAttribute("x1", frame.neckX - Math.cos(lineA) * 150);
      els.angleLine.setAttribute("y1", frame.cy - Math.sin(lineA) * 150);
      els.angleLine.setAttribute("x2", frame.neckX + Math.cos(lineA) * 150);
      els.angleLine.setAttribute("y2", frame.cy + Math.sin(lineA) * 150);

      // Set boundary visuals.
      const sxL = xToPx(state.xMin), sxR = xToPx(state.xMax);
      const syT = vToPx(state.yTop), syB = vToPx(state.yBottom);
      els.setBoundRect.setAttribute("x", sxL);
      els.setBoundRect.setAttribute("y", syT);
      els.setBoundRect.setAttribute("width", Math.max(1, sxR - sxL));
      els.setBoundRect.setAttribute("height", Math.max(1, syB - syT));
      for (const [line, x] of [[els.leftClipLine, sxL], [els.rightClipLine, sxR]]) {
        line.setAttribute("x1", x); line.setAttribute("x2", x);
        line.setAttribute("y1", syT); line.setAttribute("y2", syB);
      }
      els.leftClipHandle.setAttribute("x", sxL - 10);
      els.leftClipHandle.setAttribute("y", (syT + syB) / 2 - 20);
      els.rightClipHandle.setAttribute("x", sxR - 10);
      els.rightClipHandle.setAttribute("y", (syT + syB) / 2 - 20);
      els.leftClipLabel.setAttribute("x", sxL);
      els.rightClipLabel.setAttribute("x", sxR);
      for (const [line, y] of [[els.topClipLine, syT], [els.bottomClipLine, syB]]) {
        line.setAttribute("x1", sxL); line.setAttribute("x2", sxR);
        line.setAttribute("y1", y); line.setAttribute("y2", y);
      }
      els.topClipHandle.setAttribute("x", (sxL + sxR) / 2 - 16);
      els.topClipHandle.setAttribute("y", syT - 7);
      els.bottomClipHandle.setAttribute("x", (sxL + sxR) / 2 - 16);
      els.bottomClipHandle.setAttribute("y", syB - 7);

      // Per-gripper hover hit-zones (transparent), tracking each gripper's position.
      const sH = Math.max(20, syB - syT);
      els.leftHit.setAttribute("x", sxL - 22); els.leftHit.setAttribute("y", syT); els.leftHit.setAttribute("height", sH);
      els.rightHit.setAttribute("x", sxR - 22); els.rightHit.setAttribute("y", syT); els.rightHit.setAttribute("height", sH);
      const sW = Math.max(20, sxR - sxL);
      els.topHit.setAttribute("x", sxL); els.topHit.setAttribute("width", sW); els.topHit.setAttribute("y", syT - 11);
      els.bottomHit.setAttribute("x", sxL); els.bottomHit.setAttribute("width", sW); els.bottomHit.setAttribute("y", syB - 11);

      // Tolerance range visuals.
      const xL = xToPx(left), xR = xToPx(right);
      els.windowRect.setAttribute("x", xL);
      els.windowRect.setAttribute("width", Math.max(1, xR - xL));
      els.leftBound.setAttribute("x1", xL); els.leftBound.setAttribute("x2", xL);
      els.rightBound.setAttribute("x1", xR); els.rightBound.setAttribute("x2", xR);
      els.leftHandle.setAttribute("x", xL - 9);
      els.rightHandle.setAttribute("x", xR - 9);

      // Current point: bounded by the cone, and capped by the set boundary's y.
      const dotPx = xToPx(state.dotX);
      const hh = coneHalf(state.dotX);
      const dotY = frame.cy - state.dotV * hh;
      els.dot.setAttribute("cx", dotPx);
      els.dot.setAttribute("cy", dotY);
      els.dotLabel.setAttribute("x", dotPx);
      els.dotLabel.setAttribute("y", state.dotV >= 0 ? Math.max(64, dotY - 14) : Math.min(178, dotY + 22));

      // Readouts.
      els.microSet.textContent = `set boundary ${fmt(state.xMin)} to ${fmt(state.xMax)}`;
      els.microRange.textContent = `range ${fmt(left)} to ${fmt(right)}`;
      els.microDot.textContent = hh < 1 ? `point ${fmt(state.dotX)} · on spine (neck)` : `point ${fmt(state.dotX)}`;
    }

    // The recency band: min/max of the point's x over the last X time. Always
    // includes the current point, so it contracts back to the point when idle.
    function renderRecency(nowMs) {
      samples = samples.filter(s => nowMs - s.t <= windowMs);
      let lo = state.dotX, hi = state.dotX;
      for (const s of samples) { if (s.x < lo) lo = s.x; if (s.x > hi) hi = s.x; }
      const bxL = xToPx(lo), bxR = xToPx(hi);
      els.recentBand.setAttribute("x", bxL);
      els.recentBand.setAttribute("width", Math.max(2, bxR - bxL));
      els.recentBand.setAttribute("y", frame.y);
      els.recentBand.setAttribute("height", frame.h);
      els.microRecent.textContent = `recent bound ${fmt(lo)} to ${fmt(hi)}`;
    }

    function sample(nowMs) { samples.push({ t: nowMs, x: state.dotX }); }

    function drag(target, onMove, options = {}) {
      target.addEventListener("pointerdown", evt => {
        if (options.ignoreHandles && evt.target.closest && evt.target.closest(".handle, .dotHandle")) return;
        evt.preventDefault();
        evt.stopPropagation();
        target.setPointerCapture(evt.pointerId);
        const start = clientToSvg(els.bar, evt);
        const init = { ...state };
        const move = e => { e.preventDefault(); onMove(clientToSvg(els.bar, e), start, init); render(); if (options.tracks) sample(lastClockMs); };
        const up = () => {
          target.releasePointerCapture(evt.pointerId);
          target.removeEventListener("pointermove", move);
          target.removeEventListener("pointerup", up);
        };
        target.addEventListener("pointermove", move);
        target.addEventListener("pointerup", up);
      });
    }

    // Body drag: slide the range window (and carry the point) across the whole field.
    drag(els.region, (p, start, init) => {
      const dx = pxToX(xToPx(init.xCenter) + (p.x - start.x)) - init.xCenter;
      state.xCenter = clamp(init.xCenter + dx, -1 + init.width / 2, 1 - init.width / 2);
      state.dotX = clamp(init.dotX + (state.xCenter - init.xCenter), state.xCenter - init.width / 2, state.xCenter + init.width / 2);
    }, { ignoreHandles: true, tracks: true });

    drag(els.leftHandle, (p, start, init) => {
      const right = init.xCenter + init.width / 2;
      const left = clamp(pxToX(p.x), -1, right - 0.10);
      state.width = right - left; state.xCenter = (right + left) / 2;
    });
    drag(els.rightHandle, (p, start, init) => {
      const left = init.xCenter - init.width / 2;
      const right = clamp(pxToX(p.x), left + 0.10, 1);
      state.width = right - left; state.xCenter = (right + left) / 2;
    });

    // Current point: along the axis (within range) and within the cone aperture.
    drag(els.dot, (p, start, init) => {
      const left = init.xCenter - init.width / 2;
      const right = init.xCenter + init.width / 2;
      state.dotX = clamp(pxToX(p.x), left, right);
      const hh = coneHalf(state.dotX);
      state.dotV = hh < 1 ? 0 : clamp((frame.cy - p.y) / hh, -1, 1);
    }, { tracks: true });

    // Set boundary clippers (cyan): the hard outer limits.
    drag(els.leftClipper, (p, start, init) => { state.xMin = clamp(pxToX(p.x), -1, init.xMax - 0.12); });
    drag(els.rightClipper, (p, start, init) => { state.xMax = clamp(pxToX(p.x), init.xMin + 0.12, 1); });
    drag(els.topClipper, (p, start, init) => { state.yTop = clamp(pxToV(p.y), init.yBottom + 0.12, 1); });
    drag(els.bottomClipper, (p, start, init) => { state.yBottom = clamp(pxToV(p.y), -1, init.yTop - 0.12); });

    // Knob.
    function updateKnobFromEvent(evt) {
      const r = els.knob.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      const deg = Math.atan2(evt.clientY - cy, evt.clientX - cx) * 180 / Math.PI + 90;
      state.clock = degreesToClock(deg);
      render();
    }
    els.knob.addEventListener("pointerdown", evt => {
      evt.preventDefault();
      els.knob.setPointerCapture(evt.pointerId);
      updateKnobFromEvent(evt);
      const move = e => updateKnobFromEvent(e);
      const up = () => {
        els.knob.releasePointerCapture(evt.pointerId);
        els.knob.removeEventListener("pointermove", move);
        els.knob.removeEventListener("pointerup", up);
      };
      els.knob.addEventListener("pointermove", move);
      els.knob.addEventListener("pointerup", up);
    });
    els.knob.addEventListener("keydown", evt => {
      if (evt.key === "ArrowRight" || evt.key === "ArrowUp") { state.clock = state.clock === 12 ? 1 : state.clock + 1; render(); }
      if (evt.key === "ArrowLeft" || evt.key === "ArrowDown") { state.clock = state.clock === 1 ? 12 : state.clock - 1; render(); }
    });

    // Recency window control.
    els.windowSlider.addEventListener("input", () => {
      windowMs = parseFloat(els.windowSlider.value) * 1000;
      els.windowValue.textContent = `${parseFloat(els.windowSlider.value).toFixed(1)} s`;
    });

    // Animation loop: ages out old samples so the recent bound decays back to the point.
    function loop(ts) {
      lastClockMs = ts;
      renderRecency(ts);
      requestAnimationFrame(loop);
    }

    drawTicks();
    render();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
